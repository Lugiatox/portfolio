<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Brand-kit cover picker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#fff;--bg2:#f5f5f2;--ink:#141414;--sub:#6b6b6b;--line:#e6e6e2;--accent:#1E43E5;--ok:#12a150}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg2);color:var(--ink);font-family:'Inter',system-ui,sans-serif;line-height:1.5}
.wrap{max-width:1300px;margin:0 auto;padding:40px 24px 100px}
h1{font-size:30px;font-weight:800;letter-spacing:-.02em}
.intro{color:var(--sub);margin-top:10px;max-width:820px}
.grp{font-size:13px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin:42px 0 4px}
.sub{font-size:13px;color:var(--sub);margin-bottom:12px}
.opts{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.opt{border:2px solid var(--line);border-radius:10px;overflow:hidden;cursor:pointer;background:#000;position:relative;transition:.15s}
.opt:hover{border-color:var(--accent);transform:translateY(-2px)}
.opt.cur{border-color:var(--ok)}
.opt img{width:100%;aspect-ratio:16/10;object-fit:cover;display:block}
.opt .lab{position:absolute;top:6px;left:6px;background:var(--accent);color:#fff;font-weight:800;font-size:13px;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.opt.cur .lab{background:var(--ok)}
.opt .cbadge{position:absolute;top:6px;right:6px;background:var(--ok);color:#fff;font-weight:800;font-size:10px;letter-spacing:.06em;padding:3px 8px;border-radius:100px}
.modal{position:fixed;inset:0;background:rgba(10,10,12,.92);display:none;align-items:center;justify-content:center;padding:24px;z-index:10}
.modal.on{display:flex}
.modal img{max-width:96vw;max-height:92vh;border-radius:8px}
.modal .x{position:fixed;top:16px;right:20px;background:#fff;border:0;width:44px;height:44px;border-radius:50%;font-size:18px;cursor:pointer}
@media(max-width:900px){.opts{grid-template-columns:repeat(3,1fr)}}
@media(max-width:560px){.opts{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap">
  <h1>Brand-kit cover picker</h1>
  <p class="intro">These are the five new brand kits, now live in the Branding section. Green = the cover image I set on each brand button by default. Click any image to enlarge. Tell me your pick as "brand, number" (for example "Trader Nation, 4") if you want a different cover.</p>
  <div id="list"></div>
</div>
<div class="modal" id="modal" onclick="if(event.target===this)this.classList.remove('on')"><button class="x" onclick="document.getElementById('modal').classList.remove('on')">✕</button><img id="mimg"></div>
<script>
const BRANDS=[
 {slug:'validator',name:'validator.com',n:7,cover:6},
 {slug:'fogees',name:'Fogees Hub',n:7,cover:3},
 {slug:'trader',name:'Trader Nation',n:5,cover:4},
 {slug:'seb',name:'Seb Montgomery',n:9,cover:3},
 {slug:'aiseb',name:'AI with Seb',n:5,cover:2}
];
document.getElementById('list').innerHTML=BRANDS.map(b=>{
 const opts=Array.from({length:b.n},(_,i)=>{
  const num=i+1, nn=String(num).padStart(2,'0'), cur=num===b.cover;
  const full=`assets/branding/${b.slug}/large/${nn}.jpg`;
  return `<div class="opt ${cur?'cur':''}" onclick="zoom('${full}')"><span class="lab">${num}</span>${cur?'<span class="cbadge">COVER</span>':''}<img loading="lazy" src="assets/branding/${b.slug}/thumb/${nn}.jpg"></div>`;
 }).join('');
 return `<div class="grp">${b.name}</div><div class="sub">${b.n} boards · current cover is #${b.cover} (green)</div><div class="opts">${opts}</div>`;
}).join('');
function zoom(src){document.getElementById('mimg').src=src;document.getElementById('modal').classList.add('on');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('modal').classList.remove('on');});
</script>
</body>
</html>
